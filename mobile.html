<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LEHS Mobile Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root { --ink:#0d0d0d; --paper:#f5f0e8; --card:#fff; --accent:#c8400c; --accent2:#1a6b4a; --muted:#6b6560; --border:#ddd8ce; }
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sora',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;padding-bottom:70px;}

/* Dashboard UI */
header{background:var(--ink);color:#fff;padding:15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;}
.brand{font-family:'DM Serif Display';font-size:18px;}
.brand em{color:var(--accent);font-style:italic;}

.mob-nav{position:fixed;bottom:0;left:0;right:0;background:var(--ink);display:flex;justify-content:space-around;padding:12px;z-index:1000;border-top:1px solid #333;}
.nav-item{color:#fff;font-size:11px;text-decoration:none;opacity:0.5;text-align:center;}
.nav-item.active{opacity:1;color:var(--accent);font-weight:700;}

.card{background:var(--card);margin:10px;border-radius:12px;padding:15px;border:1px solid var(--border);}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px;}
.kpi-card{background:var(--card);padding:15px;border-radius:12px;border:1px solid var(--border);border-left:4px solid var(--accent);}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted);}
.kpi-val{font-family:'DM Serif Display';font-size:18px;margin-top:4px;}

/* Pivot Table Mobile Optimization */
.pivot-scroll{overflow:auto;max-height:500px;border-radius:8px;border:1px solid var(--border);}
.pivot-table{width:100%;border-collapse:collapse;font-size:11px;}
.pivot-table th, .pivot-table td{padding:8px;border:1px solid #eee;text-align:right;}
.pivot-table .row-label{text-align:left;position:sticky;left:0;background:var(--card);font-weight:600;min-width:140px;}
</style>
</head>
<body>

<header>
  <div class="brand">LEHS <em>Dashboard</em></div>
  <div id="status" style="font-size:10px; opacity:0.6;">Connecting...</div>
</header>

<div id="page-overview" class="mob-page">
  <div class="kpi-grid" id="kpi-box"></div>
  <div class="card">
    <canvas id="chart-main" style="height:250px;"></canvas>
  </div>
</div>

<div id="page-pivot" class="mob-page" style="display:none;">
  <div class="card">
    <h3 style="font-family:'DM Serif Display';margin-bottom:10px;">Budget Pivot (Cr)</h3>
    <div id="pivot-container" class="pivot-scroll"></div>
  </div>
</div>

<nav class="mob-nav">
  <a href="#" class="nav-item active" onclick="showTab('overview', this)">OVERVIEW</a>
  <a href="#" class="nav-item" onclick="showTab('pivot', this)">PIVOT</a>
  <a href="index.html" class="nav-item">DESKTOP</a>
</nav>

<script>
let rawData = [], filtered = [];

// 1. GITHUB DATA FETCH
async function initDashboard() {
  const GITHUB_RAW_URL = "https://raw.githubusercontent.com/lehs-dashboard/lehs-reports/main/dashboard_data.xlsx";
  try {
    const res = await fetch(GITHUB_RAW_URL);
    const ab = await res.arrayBuffer();
    const wb = XLSX.read(ab, {type: 'array'});
    processData(wb);
    document.getElementById('status').innerText = "Live: GitHub";
  } catch (e) {
    document.getElementById('status').innerText = "Offline";
    console.error(e);
  }
}

function processData(wb) {
  const ws = wb.Sheets[wb.SheetNames[0]];
  const data = XLSX.utils.sheet_to_json(ws);
  
  rawData = data.map(r => ({
    date: r.Date || 'Unspecified',
    vendor: r['Vendor Name'] || 'Unspecified',
    amount: parseFloat(r.Amount) || 0,
    budget: r['Budget Line'] || 'Unspecified',
    source: r.Source || 'General',
    monthKey: r.Date ? r.Date.split('/')[1] + '-' + r.Date.split('/')[2] : 'Unknown'
  }));
  
  filtered = [...rawData];
  renderAll();
}

function renderAll() {
  renderKPIs();
  renderMainChart();
  renderPivot();
}

function renderKPIs() {
  const total = filtered.reduce((s,r) => s+r.amount, 0);
  document.getElementById('kpi-box').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">TOTAL EXPENSE</div><div class="kpi-val">₹${(total/10000000).toFixed(2)}Cr</div></div>
    <div class="kpi-card" style="border-left-color:var(--accent2)"><div class="kpi-label">ENTRIES</div><div class="kpi-val">${filtered.length}</div></div>
  `;
}

function renderPivot() {
  const budgets = [...new Set(filtered.map(r => r.budget))].sort();
  const months = [...new Set(filtered.map(r => r.monthKey))].sort();
  
  let html = `<table class="pivot-table"><thead><tr><th class="row-label">Budget</th>`;
  months.forEach(m => html += `<th>${m}</th>`);
  html += `</tr></thead><tbody>`;

  budgets.forEach(b => {
    html += `<tr><td class="row-label">${b}</td>`;
    months.forEach(m => {
      const val = filtered.filter(r => r.budget === b && r.monthKey === m).reduce((s,r) => s+r.amount, 0);
      html += `<td>${(val/10000000).toFixed(2)}</td>`;
    });
    html += `</tr>`;
  });
  document.getElementById('pivot-container').innerHTML = html + `</tbody></table>`;
}

function renderMainChart() {
  const ctx = document.getElementById('chart-main').getContext('2d');
  const agg = {};
  filtered.forEach(r => agg[r.source] = (agg[r.source] || 0) + r.amount);
  
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: Object.keys(agg),
      datasets: [{ data: Object.values(agg), backgroundColor: ['#c8400c', '#1a6b4a', '#2c4a8c'] }]
    },
    options: { responsive: true, maintainAspectRatio: false }
  });
}

function showTab(id, el) {
  document.querySelectorAll('.mob-page').forEach(p => p.style.display = 'none');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).style.display = 'block';
  el.classList.add('active');
}

window.onload = initDashboard;
</script>
</body>
</html>
